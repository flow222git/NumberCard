<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>練息場 - 號碼牌與簽到表產生器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;}
/* ── 控制面板 ── */
.panel{background:#fff;border-bottom:1px solid #e2e8f0;padding:20px 28px;position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid #f1f5f9;margin-bottom:18px;}
.panel-title{display:flex;align-items:center;gap:10px;}
.panel-title h1{font-size:17px;font-weight:700;color:#0f172a;}
.panel-title p{font-size:11px;color:#94a3b8;margin-top:2px;}
.btn-print{background:#4f46e5;color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-print:hover{background:#4338ca;}
/* ── 欄位格線 ── */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 280px;gap:14px;}
label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;}
input[type=text],input[type=number]{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:7px 11px;font-size:13px;color:#1e293b;outline:none;transition:border .15s;}
input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
input[type=file]{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:11px;color:#64748b;cursor:pointer;}
.tip{font-size:10px;color:#94a3b8;margin-top:4px;}
.notice{display:flex;align-items:center;gap:8px;font-size:11px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;padding:8px 12px;border-radius:8px;margin-top:12px;}

/* ── 歷史紀錄按鈕 ── */
.history-wrap{position:relative;display:inline-block;}
.btn-history{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s;}
.btn-history:hover{background:#e2e8f0;}
.history-dropdown{display:none;position:absolute;right:0;top:38px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:999;min-width:260px;overflow:hidden;}
.history-dropdown.open{display:block;}
.history-head{padding:10px 14px;font-size:11px;font-weight:700;color:#64748b;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;}
.history-clear{font-size:10px;color:#ef4444;cursor:pointer;font-weight:600;}
.history-clear:hover{text-decoration:underline;}
.history-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f8fafc;transition:background .1s;}
.history-item:last-child{border-bottom:none;}
.history-item:hover{background:#f8fafc;}
.history-item .hi-title{font-size:13px;font-weight:600;color:#1e293b;}
.history-item .hi-sub{font-size:10px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px;}
.history-empty{padding:16px 14px;text-align:center;font-size:12px;color:#94a3b8;}

/* ── A4 頁面 ── */
.output{max-width:215mm;margin:0 auto;padding:20px 0 48px;}
.a4-page{width:210mm;min-height:297mm;height:297mm;padding:15mm 15mm 10mm 15mm;margin:0 auto 20px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08);box-sizing:border-box;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
/* 號碼牌格 */
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(5,1fr);flex-grow:1;border:2px solid #d1d5db;border-radius:4px;}
/* 表格 */
table{width:100%;border-collapse:collapse;text-align:center;font-size:11px;}
th,td{border:1px solid #1f2937;}
thead tr{background:#f3f4f6;height:38px;}
th{font-weight:700;color:#111827;}
tbody tr{height:46px;}

@page{size:A4;margin:0;}
@media print{
  body{background:#fff;margin:0;padding:0;}
  .no-print{display:none!important;}
  .a4-page{margin:0!important;box-shadow:none!important;page-break-after:always;width:210mm;height:297mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>
</head>
<body>

<div class="panel no-print">
  <div class="panel-header">
    <div class="panel-title">
      <span style="font-size:24px">🎟️</span>
      <div>
        <h1>練息場 號碼牌與簽到表產生器</h1>
        <p>專為 A4 尺寸設計，支援自動分頁</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <!-- 歷史紀錄按鈕 -->
      <div class="history-wrap">
        <button class="btn-history" onclick="toggleHistory()" title="歷史紀錄">🕘</button>
        <div class="history-dropdown" id="historyDropdown">
          <div class="history-head">
            最近 10 筆紀錄
            <span class="history-clear" onclick="clearHistory()">清除全部</span>
          </div>
          <div id="historyList"></div>
        </div>
      </div>
      <button class="btn-print" onclick="saveHistory(); window.print()">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2m8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
        列印 A4 文件
      </button>
    </div>
  </div>

  <div class="grid4">
    <div>
      <label>📝 活動名稱</label>
      <input type="text" id="eventTitleInput" value="練息場" oninput="updateSettings()">
    </div>
    <div>
      <label>🏷️ 號碼牌底部備註</label>
      <input type="text" id="eventDescInput" value="憑此牌進行簽到領取，請妥善保管" oninput="updateSettings()">
    </div>
    <div>
      <label>🔢 總號碼數</label>
      <input type="number" id="totalNumInput" value="30" min="1" max="200" oninput="updateSettings()">
    </div>
    <div>
      <label>📏 簽到表每頁行數（推薦 15）</label>
      <input type="number" id="rowsPerPageInput" value="15" min="5" max="25" oninput="updateSettings()">
    </div>
  </div>

  <div class="grid2">
    <div>
      <label>🛠️ 自訂簽到表欄位（逗號隔開）</label>
      <input type="text" id="columnsInput" value="編號, 到場簽名, 聯絡電話, 領取號碼牌 (簽收欄), 備註" oninput="updateSettings()">
      <p class="tip">💡 第一欄固定為流水號，後續欄位自動平均分配寬度</p>
    </div>
    <div>
      <label>🖼️ 更換 Logo（可選）</label>
      <input type="file" id="logoInput" accept="image/*" onchange="handleLogoUpload(this)">
    </div>
  </div>

  <div class="notice">
    💡 <span><b>完美列印：</b>瀏覽器列印設定請將邊界設為「無」，並勾選「顯示背景圖形」</span>
  </div>
</div>

<div id="print-output-container" class="output"></div>

<script>
let logoSrc = "練息場 logo 背景透明.png";

// ── 歷史紀錄 ──
const HISTORY_KEY = 'jte_form_history';

function getHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch(e){ return []; }
}

function saveHistory(){
  const title = document.getElementById('eventTitleInput').value.trim();
  const cols = document.getElementById('columnsInput').value.trim();
  if(!title) return;
  let history = getHistory();
  // 移除相同 title+cols 的舊紀錄
  history = history.filter(h => !(h.title === title && h.cols === cols));
  history.unshift({
    title,
    desc: document.getElementById('eventDescInput').value,
    total: document.getElementById('totalNumInput').value,
    rows: document.getElementById('rowsPerPageInput').value,
    cols,
    ts: Date.now()
  });
  if(history.length > 10) history = history.slice(0, 10);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistoryList();
}

function applyHistory(item){
  document.getElementById('eventTitleInput').value = item.title;
  document.getElementById('eventDescInput').value = item.desc;
  document.getElementById('totalNumInput').value = item.total;
  document.getElementById('rowsPerPageInput').value = item.rows;
  document.getElementById('columnsInput').value = item.cols;
  updateSettings();
  closeHistory();
}

function clearHistory(){
  localStorage.removeItem(HISTORY_KEY);
  renderHistoryList();
}

function renderHistoryList(){
  const list = document.getElementById('historyList');
  const history = getHistory();
  if(!history.length){
    list.innerHTML = '<div class="history-empty">尚無紀錄</div>';
    return;
  }
  list.innerHTML = history.map((h,i) => {
    const d = new Date(h.ts);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="history-item" onclick="applyHistory(${JSON.stringify(JSON.stringify(h)).slice(1,-1)})">
      <div class="hi-title">${h.title}</div>
      <div class="hi-sub">${dateStr}　${h.cols}</div>
    </div>`;
  }).join('');
}

function toggleHistory(){
  const dd = document.getElementById('historyDropdown');
  renderHistoryList();
  dd.classList.toggle('open');
}
function closeHistory(){
  document.getElementById('historyDropdown').classList.remove('open');
}
document.addEventListener('click', e => {
  if(!e.target.closest('.history-wrap')) closeHistory();
});

// ── Logo ──
function handleLogoUpload(input){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = e => { logoSrc = e.target.result; updateSettings(); };
    reader.readAsDataURL(input.files[0]);
  }
}

// ── 主渲染 ──
function updateSettings(){
  const eventTitle = document.getElementById('eventTitleInput').value || '練息場';
  const eventDesc  = document.getElementById('eventDescInput').value || '憑此牌進行簽到領取，請妥善保管';
  const totalNum   = parseInt(document.getElementById('totalNumInput').value) || 30;
  const rowsPerPage= parseInt(document.getElementById('rowsPerPageInput').value) || 15;
  const columnsRaw = document.getElementById('columnsInput').value;
  const columns    = columnsRaw.split(/[,，]/).map(c=>c.trim()).filter(c=>c.length>0);

  const totalSignInPages = Math.ceil(totalNum / rowsPerPage);
  const totalCardPages   = Math.ceil(totalNum / 10);
  const grandTotal       = totalSignInPages + totalCardPages;

  const container = document.getElementById('print-output-container');
  container.innerHTML = '';

  // ── 簽到頁 ──
  for(let pi=0; pi<totalSignInPages; pi++){
    const startNum = pi*rowsPerPage+1;
    const endNum   = Math.min((pi+1)*rowsPerPage, totalNum);
    const page = el('div','a4-page');

    // header
    const hdr = el('div','');
    hdr.style.cssText='border-bottom:4px double #1f2937;padding-bottom:12px;margin-bottom:14px;';
    hdr.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 4px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="${logoSrc}" alt="練息場" style="height:48px;width:auto;object-fit:contain;" onerror="this.style.display='none'">
          <div>
            <div style="font-size:20px;font-weight:900;letter-spacing:.1em;color:#0f172a;">${eventTitle}</div>
            <div style="font-size:14px;font-weight:800;color:#374151;margin-top:2px;">流水號簽到登記表 (${pad(startNum)} – ${pad(endNum)})</div>
          </div>
        </div>
        <div style="text-align:right;font-size:11px;color:#4b5563;">
          總計應到：_______ 人
        </div>
      </div>`;
    page.appendChild(hdr);

    // table
    const wrap = el('div',''); wrap.style.flexGrow='1';
    const tbl = el('table','');
    // thead
    const thead=el('thead',''); const tr0=el('tr','');
    columns.forEach((c,i)=>{
      const th=el('th',''); th.textContent=c;
      th.style.cssText= i===0 ? 'width:52px;background:#f9fafb;font-size:12px;' : (i===1 ? 'width:140px;' : '');
      tr0.appendChild(th);
    });
    thead.appendChild(tr0); tbl.appendChild(thead);
    // tbody
    const tbody=el('tbody','');
    for(let r=startNum;r<=endNum;r++){
      const tr=el('tr','');
      columns.forEach((_,i)=>{
        const td=el('td','');
        if(i===0){ td.textContent=pad(r); td.style.cssText='font-weight:700;background:#f9fafb;font-size:12px;'; }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    // 補空行
    const filled=endNum-startNum+1;
    for(let d=0;d<rowsPerPage-filled;d++){
      const tr=el('tr',''); tr.style.background='#fafafa';
      columns.forEach((_,i)=>{
        const td=el('td',''); td.style.borderStyle='dashed'; td.style.borderColor='#d1d5db';
        if(i===0){ td.textContent='-'; td.style.color='#d1d5db'; }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody); wrap.appendChild(tbl); page.appendChild(wrap);

    // footer
    const ftr=el('div','');
    ftr.style.cssText='display:flex;justify-content:space-between;font-size:9px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:6px;margin-top:12px;';
    ftr.innerHTML=`<span>練息場簽到系統</span><span>第 ${pi+1} 頁 / 共 ${grandTotal} 頁（簽到表）</span>`;
    page.appendChild(ftr);
    container.appendChild(page);
  }

  // ── 號碼牌頁 ──
  for(let pi=0;pi<totalCardPages;pi++){
    const page=el('div','a4-page');
    const grid=el('div','card-grid');

    for(let ci=0;ci<10;ci++){
      const num=pi*10+ci+1;
      const card=el('div','');
      card.style.cssText='border:1px dashed #9ca3af;padding:14px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;';
      if(num>totalNum){
        card.style.cssText+='border-color:#e5e7eb;';
        card.innerHTML='<span style="font-size:10px;color:#e5e7eb;">（預留空白）</span>';
      } else {
        card.innerHTML=`
          <div style="height:44px;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;">
            <img src="${logoSrc}" alt="" style="max-height:44px;max-width:90%;object-fit:contain;" onerror="this.style.display='none'">
          </div>
          <div style="text-align:center;">
            <span style="font-size:48px;font-weight:900;letter-spacing:-.04em;color:#111827;font-variant-numeric:tabular-nums;">${pad(num)}</span>
          </div>
          <div style="text-align:center;">
            <p style="font-size:8px;color:#9ca3af;max-width:160px;margin:0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${eventDesc}</p>
          </div>`;
      }
      grid.appendChild(card);
    }
    page.appendChild(grid);

    const ftr=el('div','');
    ftr.style.cssText='display:flex;justify-content:space-between;font-size:9px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:6px;margin-top:8px;';
    ftr.innerHTML=`<span>號碼牌（每張 A4 裁切為 10 張）</span><span>第 ${totalSignInPages+pi+1} 頁 / 共 ${grandTotal} 頁（號碼牌）</span>`;
    page.appendChild(ftr);
    container.appendChild(page);
  }
}

function el(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function pad(n){ return String(n).padStart(2,'0'); }

window.onload = updateSettings;
</script>
</body>
</html>
